<!DOCTYPE html>
<html>
<head>
    <title>Assignment 10 - Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">ICT12367</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">หน้าแรก</a>
                <a class="nav-link active" href="/form/">แบบฟอร์ม</a>
            </div>
        </div>
    </nav>

    <div class="bg-success text-white text-center py-5 mb-4">
        <h1>แบบฟอร์มบันทึกข้อมูลประชากร</h1>
        <p>กรุณากรอกข้อมูลให้ครบถ้วน</p>
    </div>

    <div class="container" style="max-width: 600px;">
        <div class="card p-4 shadow">
            <form method="POST" action="/form/">
    {% csrf_token %} <div class="mb-3">
        <label class="form-label">ชื่อประชากร</label>
        <input type="text" name="name" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
    </div>
    <div class="mb-3">
        <label class="form-label">อายุ</label>
        <input type="number" name="age" class="form-control" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" required>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">ลงทะเบียน</button> <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
    </div>
</form>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
