<!DOCTYPE html>
<html>
<head>
    <title>Assignment 12 - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">ICT12367</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/">หน้าแรก</a>
                <a class="nav-link" href="/form/">แบบฟอร์ม</a>
            </div>
        </div>
    </nav>

    <div class="bg-primary text-white text-center py-5 mb-4">
        <h1>ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367</h1>
    </div>

    <div class="container">
        <h2 class="text-center mb-4">รายชื่อประชากร</h2>
        <div class="row mb-3 justify-content-end">
    <div class="col-md-4">
        <form action="/" method="GET" class="d-flex">
            <input class="form-control me-2" type="search" name="q" 
                   placeholder="ค้นหาชื่อประชากร..." aria-label="Search" 
                   value="{{ request.GET.q }}">
            <button class="btn btn-outline-primary me-2" type="submit">ค้นหา</button>
            <a href="/" class="btn btn-outline-secondary">ล้างค่า</a>
        </form>
    </div>
</div>
        <table class="table table-bordered table-hover">
            <thead class="table-dark text-center">
                <tr>
                    <th>รหัสประชากร</th> <th>ชื่อประชากร</th>
                    <th>อายุ</th>
                    <th>วันที่เพิ่มข้อมูล</th> <th>จัดการข้อมูล</th>
                </tr>
            </thead>
<tbody>
    {% for p in persons %}
    <tr class="text-center">
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.age }}</td>
        <td>{{ p.date|date:"F d, Y" }}</td>
        <td>
            <a href="/edit/{{ p.id }}" class="btn" style="background-color: #FF69B4; color: white;">แก้ไข</a>
            <a href="/delete/{{ p.id }}" class="btn" style="background-color: #FF8C00; color: white;" onclick="return confirm('ยืนยันการลบ?')">ลบ</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5" class="text-center text-muted py-4">ไม่พบข้อมูลที่คุณค้นหา</td>
    </tr>
    {% endfor %}
</tbody>
        </table>
    </div>
</body>
</html>
