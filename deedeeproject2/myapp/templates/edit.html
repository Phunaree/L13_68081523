<!DOCTYPE html>
<html>
<head>
    <title>Edit Population - Lab 12</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark text-center">
                        <h3>แบบฟอร์มแก้ไขข้อมูลประชากร</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="/edit/{{ person.id }}/">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">ชื่อประชากร</label>
                                <input type="text" class="form-control" name="name" value="{{ person.name }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">อายุ</label>
                                <input type="number" class="form-control" name="age" value="{{ person.age }}" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">บันทึกการแก้ไข</button>
                                <a href="/" class="btn btn-secondary">ยกเลิก</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
